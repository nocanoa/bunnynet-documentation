name: Update Changelog

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to (re)generate the changelog for"
        required: true
        type: string

jobs:
  update-changelog:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       !startsWith(github.head_ref, 'changelog/') &&
       !startsWith(github.head_ref, 'fix/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          EVENT_MERGED_AT: ${{ github.event.pull_request.merged_at }}
          EVENT_PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="$INPUT_PR_NUMBER"
            PR_DATA=$(gh pr view "$PR_NUMBER" --json mergeCommit,mergedAt,title,headRefName,state)
            STATE=$(echo "$PR_DATA" | jq -r '.state')
            HEAD_REF=$(echo "$PR_DATA" | jq -r '.headRefName')
            MERGE_SHA=$(echo "$PR_DATA" | jq -r '.mergeCommit.oid // ""')
            MERGED_AT=$(echo "$PR_DATA" | jq -r '.mergedAt // ""')
            PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')
            if [ "$STATE" != "MERGED" ] || [ -z "$MERGE_SHA" ]; then
              echo "PR #$PR_NUMBER is not merged (state=$STATE). Aborting." >&2
              exit 1
            fi
            case "$HEAD_REF" in
              changelog/*|fix/*)
                echo "PR #$PR_NUMBER head ref ($HEAD_REF) is excluded from changelog generation. Aborting." >&2
                exit 1
                ;;
            esac
          else
            PR_NUMBER="$EVENT_PR_NUMBER"
            MERGE_SHA="$EVENT_MERGE_SHA"
            MERGED_AT="$EVENT_MERGED_AT"
            PR_TITLE="$EVENT_PR_TITLE"
          fi

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "merge_sha=$MERGE_SHA" >> $GITHUB_OUTPUT
          echo "merged_at=$MERGED_AT" >> $GITHUB_OUTPUT
          # Title can contain anything; use a delimited heredoc for safety.
          {
            echo "pr_title<<__EOF__"
            echo "$PR_TITLE"
            echo "__EOF__"
          } >> $GITHUB_OUTPUT

      - name: Get changed files
        id: changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          MERGE_SHA: ${{ steps.pr.outputs.merge_sha }}
        run: |
          set -euo pipefail
          # Use the GitHub API to get the actual list of files changed by this PR.
          # This is correct regardless of merge strategy (squash/merge/rebase) and
          # avoids picking up other PRs that landed on main since this PR's base.sha.
          FILES=$(gh pr view "$PR_NUMBER" --json files --jq '.files[].path' | grep -E '\.mdx?$' || true)
          if [ -z "$FILES" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "$FILES" > /tmp/changed_files.txt
            # Parent of the merge commit = main's tip immediately before this PR landed.
            # For squash merges (this repo's convention) this gives exactly the PR's diff.
            BASE_SHA=$(git rev-parse "${MERGE_SHA}^")
            echo "base_sha=${BASE_SHA}" >> $GITHUB_OUTPUT
            echo "merge_sha=${MERGE_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog entries
        if: steps.changed.outputs.skip == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MERGED_AT: ${{ steps.pr.outputs.merged_at }}
          BASE_SHA: ${{ steps.changed.outputs.base_sha }}
          MERGE_SHA: ${{ steps.changed.outputs.merge_sha }}
        run: node .github/scripts/generate-changelog.mjs

      - name: Create or update PR with changelog updates
        if: steps.changed.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          PR_TITLE: ${{ steps.pr.outputs.pr_title }}
        run: |
          set -euo pipefail
          BRANCH="changelog/pr-${PR_NUMBER}"

          if git diff --quiet; then
            echo "No changelog updates generated."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -B resets the branch if it already exists locally; safe in fresh CI too.
          git checkout -B "$BRANCH"
          git add -A
          git commit -m "docs: update changelog from PR #${PR_NUMBER}"
          # Force-with-lease so re-runs (or workflow_dispatch) can overwrite a
          # stale remote branch left behind by an earlier run.
          git push --force-with-lease origin "$BRANCH"

          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // ""')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "docs: changelog update from #${PR_NUMBER} — ${PR_TITLE}" \
              --body "Auto-generated changelog entries from PR #${PR_NUMBER}. Please review the AI-generated descriptions before merging." \
              --base main \
              --head "$BRANCH"
          else
            echo "PR #$EXISTING already exists for $BRANCH; updated branch in place."
          fi
